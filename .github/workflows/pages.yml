name: Enable and Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync gh-pages branch with main
        run: |
          git push origin main:gh-pages --force

      - name: Enable GitHub Pages on gh-pages branch
        run: |
          HTTP_CODE=$(curl -s -o /tmp/pages_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/pages_response.json
          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "204" ]; then
            echo "✅ GitHub Pages enabled successfully!"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "ℹ️ GitHub Pages already enabled, updating source..."
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pages \
              -d '{"source":{"branch":"gh-pages","path":"/"}}'
          fi

      - name: Request Pages rebuild
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
          echo ""
          echo "📌 Vote page will be available at:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/vote.html"
